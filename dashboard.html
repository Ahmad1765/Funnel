<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Submissions – Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f4f5;
            color: #111;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }
        header span {
            color: #a0aec0;
            font-size: 13px;
        }

        .container {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 20px 28px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            flex: 1;
        }
        .stat-card .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 6px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .toolbar input {
            flex: 1;
            padding: 9px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 7px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }
        .toolbar input:focus { border-color: #1a1a2e; }
        .btn {
            padding: 9px 18px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #16213e; }
        .btn-secondary { background: #f0f0f0; color: #444; }
        .btn-secondary:hover { background: #e4e4e4; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
        }
        thead tr { background: #f7f8fa; }
        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: 600;
            border-bottom: 1px solid #e8e8e8;
        }
        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: top;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .answers-cell { max-width: 600px; }
        .answer-pill {
            display: inline-block;
            background: #eef2ff;
            color: #3730a3;
            border-radius: 5px;
            padding: 3px 9px;
            font-size: 12px;
            margin: 2px 3px 2px 0;
            white-space: nowrap;
        }
        .answer-label { color: #888; }
        .answer-value { color: #111; font-weight: 600; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            background: #d1fae5;
            color: #065f46;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 15px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 14px;
        }

        .error-msg {
            background: #fff1f2;
            color: #9f1239;
            padding: 14px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        @media (max-width: 640px) {
            .stats { flex-direction: column; }
            header { padding: 16px 20px; }
            .container { padding: 0 12px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Quiz Submissions</h1>
    <span id="last-updated"></span>
</header>

<div class="container">
    <div class="stats">
        <div class="stat-card">
            <div class="label">Total Submissions</div>
            <div class="value" id="stat-total">–</div>
        </div>
        <div class="stat-card">
            <div class="label">Today</div>
            <div class="value" id="stat-today">–</div>
        </div>
        <div class="stat-card">
            <div class="label">This Week</div>
            <div class="value" id="stat-week">–</div>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="search" placeholder="Search answers…" oninput="renderTable()" />
        <button class="btn btn-primary" onclick="loadData()">Refresh</button>
        <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
    </div>

    <div id="error" class="error-msg" style="display:none;"></div>
    <div id="loading" class="loading">Loading submissions…</div>
    <div id="table-wrap" style="display:none;"></div>
</div>

<script>
    let allData = [];

    async function loadData() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('table-wrap').style.display = 'none';
        document.getElementById('error').style.display = 'none';

        try {
            const res = await fetch('/api/submissions');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            allData = await res.json();
            updateStats();
            renderTable();
            document.getElementById('last-updated').textContent =
                'Updated ' + new Date().toLocaleTimeString();
        } catch (err) {
            document.getElementById('error').textContent = 'Failed to load submissions: ' + err.message;
            document.getElementById('error').style.display = 'block';
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function updateStats() {
        const now = new Date();
        const todayStr = now.toDateString();
        const weekAgo = new Date(now - 7 * 86400000);

        document.getElementById('stat-total').textContent = allData.length;
        document.getElementById('stat-today').textContent =
            allData.filter(r => new Date(r.created_at).toDateString() === todayStr).length;
        document.getElementById('stat-week').textContent =
            allData.filter(r => new Date(r.created_at) >= weekAgo).length;
    }

    function renderTable() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = query
            ? allData.filter(r => JSON.stringify(r.answers).toLowerCase().includes(query))
            : allData;

        document.getElementById('loading').style.display = 'none';
        const wrap = document.getElementById('table-wrap');
        wrap.style.display = 'block';

        if (filtered.length === 0) {
            wrap.innerHTML = '<div class="empty-state">No submissions found.</div>';
            return;
        }

        // Collect all unique question keys for table headers
        const allKeys = [];
        filtered.forEach(r => {
            Object.keys(r.answers || {}).forEach(k => {
                if (!allKeys.includes(k)) allKeys.push(k);
            });
        });

        const headerCols = allKeys.map(k =>
            `<th>${escHtml(cleanLabel(k))}</th>`
        ).join('');

        const rows = filtered.map(r => {
            const date = new Date(r.created_at).toLocaleString('nl-NL', {
                dateStyle: 'medium', timeStyle: 'short'
            });
            const answerCols = allKeys.map(k =>
                `<td>${escHtml(r.answers?.[k] ?? '–')}</td>`
            ).join('');
            return `<tr>
                <td style="white-space:nowrap;color:#555;font-size:13px;">${date}</td>
                ${answerCols}
            </tr>`;
        }).join('');

        wrap.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Submitted</th>
                        ${headerCols}
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        `;
    }

    function cleanLabel(key) {
        return key.replace(/\s*\d+$/, '').trim();
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function exportCSV() {
        if (!allData.length) return;
        const allKeys = [];
        allData.forEach(r => {
            Object.keys(r.answers || {}).forEach(k => {
                if (!allKeys.includes(k)) allKeys.push(k);
            });
        });

        const header = ['Submitted', ...allKeys.map(cleanLabel)].join(',');
        const csvRows = allData.map(r => {
            const date = new Date(r.created_at).toISOString();
            const vals = allKeys.map(k => {
                const v = String(r.answers?.[k] ?? '');
                return '"' + v.replace(/"/g, '""') + '"';
            });
            return ['"' + date + '"', ...vals].join(',');
        });

        const blob = new Blob([header + '\n' + csvRows.join('\n')], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'quiz-submissions-' + new Date().toISOString().slice(0, 10) + '.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    loadData();
</script>
</body>
</html>
