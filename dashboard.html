<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Submissions – Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f4f5;
            color: #111;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        header h1 { color: #fff; font-size: 18px; font-weight: 700; }
        header span { color: #a0aec0; font-size: 12px; }

        /* ── Layout ── */
        .container {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 16px;
        }

        /* ── Stat cards ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
        }
        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 16px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .stat-card .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 4px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.1;
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .toolbar input {
            flex: 1;
            min-width: 160px;
            padding: 9px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 7px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }
        .toolbar input:focus { border-color: #1a1a2e; }
        .btn {
            padding: 9px 16px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #16213e; }
        .btn-secondary { background: #f0f0f0; color: #444; }
        .btn-secondary:hover { background: #e4e4e4; }

        /* ── Table wrapper — horizontal scroll on small screens ── */
        .table-scroll {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        table {
            width: 100%;
            min-width: 500px;
            border-collapse: collapse;
            background: #fff;
        }
        thead tr { background: #f7f8fa; }
        th {
            padding: 11px 14px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888;
            font-weight: 600;
            border-bottom: 1px solid #e8e8e8;
            white-space: nowrap;
        }
        td {
            padding: 12px 14px;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: top;
            max-width: 260px;
            word-break: break-word;
        }
        tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #fafafa; }

        /* ── States ── */
        .empty-state, .loading {
            text-align: center;
            padding: 48px 20px;
            color: #aaa;
            font-size: 14px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .error-msg {
            background: #fff1f2;
            color: #9f1239;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>Quiz Submissions</h1>
    <span id="last-updated"></span>
</header>

<div class="container">

    <div class="stats">
        <div class="stat-card">
            <div class="label">Total</div>
            <div class="value" id="stat-total">–</div>
        </div>
        <div class="stat-card">
            <div class="label">Today</div>
            <div class="value" id="stat-today">–</div>
        </div>
        <div class="stat-card">
            <div class="label">This Week</div>
            <div class="value" id="stat-week">–</div>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="search" placeholder="Search answers…" oninput="renderTable()" />
        <button class="btn btn-primary" onclick="loadData()">Refresh</button>
        <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
    </div>

    <div id="error" class="error-msg" style="display:none;"></div>
    <div id="loading" class="loading">Loading submissions…</div>
    <div id="table-wrap" style="display:none;"></div>

</div>

<script>
    let allData = [];

    async function loadData() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('table-wrap').style.display = 'none';
        document.getElementById('error').style.display = 'none';

        try {
            const res = await fetch('/api/submissions');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            allData = await res.json();
            updateStats();
            renderTable();
            document.getElementById('last-updated').textContent =
                'Updated ' + new Date().toLocaleTimeString();
        } catch (err) {
            document.getElementById('error').textContent = 'Failed to load: ' + err.message;
            document.getElementById('error').style.display = 'block';
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function updateStats() {
        const now = new Date();
        const todayStr = now.toDateString();
        const weekAgo = new Date(now - 7 * 86400000);

        document.getElementById('stat-total').textContent = allData.length;
        document.getElementById('stat-today').textContent =
            allData.filter(r => new Date(r.created_at).toDateString() === todayStr).length;
        document.getElementById('stat-week').textContent =
            allData.filter(r => new Date(r.created_at) >= weekAgo).length;
    }

    function renderTable() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = query
            ? allData.filter(r => JSON.stringify(r.answers).toLowerCase().includes(query))
            : allData;

        const wrap = document.getElementById('table-wrap');
        wrap.style.display = 'block';

        if (filtered.length === 0) {
            wrap.innerHTML = '<div class="empty-state">No submissions found.</div>';
            return;
        }

        const allKeys = [];
        filtered.forEach(r => {
            Object.keys(r.answers || {}).forEach(k => {
                if (!allKeys.includes(k)) allKeys.push(k);
            });
        });

        const headerCols = allKeys.map(k => `<th>${escHtml(cleanLabel(k))}</th>`).join('');

        const rows = filtered.map(r => {
            const date = new Date(r.created_at).toLocaleString('nl-NL', {
                dateStyle: 'short', timeStyle: 'short'
            });
            const answerCols = allKeys.map(k =>
                `<td>${escHtml(r.answers?.[k] ?? '–')}</td>`
            ).join('');
            return `<tr>
                <td style="white-space:nowrap;color:#555;">${date}</td>
                ${answerCols}
            </tr>`;
        }).join('');

        wrap.innerHTML = `
            <div class="table-scroll">
                <table>
                    <thead><tr><th>Submitted</th>${headerCols}</tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    }

    function cleanLabel(key) {
        return key.replace(/\s*\d+$/, '').trim();
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function exportCSV() {
        if (!allData.length) return;
        const allKeys = [];
        allData.forEach(r => {
            Object.keys(r.answers || {}).forEach(k => {
                if (!allKeys.includes(k)) allKeys.push(k);
            });
        });

        const header = ['Submitted', ...allKeys.map(cleanLabel)].join(',');
        const csvRows = allData.map(r => {
            const date = new Date(r.created_at).toISOString();
            const vals = allKeys.map(k => '"' + String(r.answers?.[k] ?? '').replace(/"/g, '""') + '"');
            return ['"' + date + '"', ...vals].join(',');
        });

        const blob = new Blob([header + '\n' + csvRows.join('\n')], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'quiz-submissions-' + new Date().toISOString().slice(0, 10) + '.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    loadData();
</script>
</body>
</html>
